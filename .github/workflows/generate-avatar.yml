name: Generate Avatar

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  generate-avatar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Ensure full history is fetched for branch switching

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Install jdenticon
        run: npm install jdenticon

      - name: Generate avatar
        run: node scripts/generateAvatar.js

      - name: Switch to gh-pages branch
        run: |
          git fetch origin gh-pages:gh-pages
          git checkout gh-pages

      - name: Copy generated avatar
        run: cp static/images/avatar.svg ./

      - name: Commit and push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add avatar.svg
          git commit -m "chore: update avatar based on latest git hash"
          git push origin gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}