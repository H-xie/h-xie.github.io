name: Build and Deploy Hugo site with Avatar

on:
  workflow_run:
    workflows:
      - Sync ORCID Publications
    types:
      - completed
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install jdenticon
        run: npm install jdenticon

      - name: Generate avatar
        run: node scripts/generateAvatar.js

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build
        run: hugo --minify

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
